<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180">
<defs>
<style>
  .r { font-family: 'Courier New', monospace; font-size: 12px; }
  .nt { font-family: 'Courier New', monospace; }
  @keyframes c0a { 0%,5%{opacity:0} 20%,70%{opacity:0.75} 90%,100%{opacity:0} }
  @keyframes c0b { 0%,25%{opacity:0} 40%,80%{opacity:0.6} 95%,100%{opacity:0} }
  @keyframes c0c { 0%,45%{opacity:0} 60%,90%{opacity:0.5} 100%{opacity:0} }
  @keyframes c1a { 0%,8%{opacity:0} 25%,68%{opacity:0.75} 88%,100%{opacity:0} }
  @keyframes c1b { 0%,28%{opacity:0} 44%,82%{opacity:0.6} 96%,100%{opacity:0} }
  @keyframes c2a { 0%,3%{opacity:0} 18%,65%{opacity:0.7} 86%,100%{opacity:0} }
  @keyframes c2b { 0%,22%{opacity:0} 38%,76%{opacity:0.55} 92%,100%{opacity:0} }
  @keyframes c3a { 0%,12%{opacity:0} 28%,72%{opacity:0.8} 90%,100%{opacity:0} }
  @keyframes c3b { 0%,32%{opacity:0} 48%,85%{opacity:0.6} 98%,100%{opacity:0} }
  @keyframes c4a { 0%,6%{opacity:0} 22%,67%{opacity:0.7} 87%,100%{opacity:0} }
  @keyframes c4b { 0%,26%{opacity:0} 42%,80%{opacity:0.55} 94%,100%{opacity:0} }
  @keyframes nameIn { 0%,35%{opacity:0} 65%,100%{opacity:1} }
  @keyframes subIn  { 0%,50%{opacity:0} 80%,100%{opacity:1} }
  @keyframes tagIn  { 0%,60%{opacity:0} 90%,100%{opacity:1} }
  @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:0.6} }
</style>
<filter id="nameGlow">
  <feGaussianBlur stdDeviation="5" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="subGlow">
  <feGaussianBlur stdDeviation="2" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>

